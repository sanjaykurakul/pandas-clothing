<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Cart - Pandas</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/panda.png">
</head>
<body>

<header class="navbar">
  <div class="left">
    <div onclick="toggleMenu()">☰</div>
  </div>

  <div class="center">
    <div class="brand">
      <img src="/images/panda.png" height="26">
      <span style="font-size:22px;font-weight:600;letter-spacing:2px;">
                PANDAS
            </span>
    </div>
  </div>

  <div class="right">

    <a href="/wishlist.html" class="icon">
      ♡
      <span id="wishlist-count" class="badge">0</span>
    </a>

    <a href="/cart.html" class="icon">
      🛒
      <span id="cart-count" class="badge">0</span>
    </a>

    <a href="/account.html" class="icon">👤</a>
<!--    <button id="placeOrderBtn">Place Order</button>-->

  </div>
</header>

<div id="sideMenu" class="side-menu">
  <div class="close-btn" onclick="toggleMenu()">✖</div>

  <ul>
    <li><a href="/index.html">Home</a></li>
    <li><a href="/account.html">Account</a></li>
    <li><a href="/shirts.html">Shirts</a></li>
    <li><a href="/cargo.html">Cargo</a></li>
    <li><a href="/tshirts.html">T-Shirts</a></li>
    <li><a href="/shoes.html">Shoes</a></li>
<!--   v-->
  </ul>
</div>

<div id="overlay" onclick="toggleMenu()"></div>


<div id="cart-container" class="cart-container"></div>

<div class="cart-summary">

  <h3>Total: ₹<span id="totalAmount"></span></h3>

  <button id="placeOrderBtn" class="place-order-btn">
    Place Order
  </button>

</div>


<script>
  document.addEventListener("DOMContentLoaded", function () {

      fetch("/cart/my")
      .then(res => res.json())
      .then(data => {

          const container = document.getElementById("cart-container");
          const totalElement = document.getElementById("totalAmount"); // ✅ FIXED

          container.innerHTML = "";
          let total = 0;

          data.forEach(item => {

              const product = item.product;
              const quantity = item.quantity;
              const size = item.size;

              total += product.price * quantity;

              const itemDiv = document.createElement("div");
              itemDiv.className = "cart-item";

              itemDiv.innerHTML = `
                  <img src="http://localhost:8081${product.image}" class="cart-img">

                  <div class="cart-details">
                      <h3>${product.name}</h3>
                      <p><strong>Size:</strong> ${size}</p>
                      <p>₹ ${product.price}</p>

                      <div>
                          <button onclick="updateQuantity(${item.id}, ${quantity - 1})">-</button>
                          <span>${quantity}</span>
                          <button onclick="updateQuantity(${item.id}, ${quantity + 1})">+</button>
                      </div>

                      <button onclick="removeItem(${item.id})">Remove</button>
                  </div>
              `;

              container.appendChild(itemDiv);
          });

          totalElement.innerText = total; // ✅ NOW WORKS
      });

  });

  function updateQuantity(cartId, quantity) {

      fetch(`/cart/update/${cartId}?quantity=${quantity}`, {
          method: "PUT"
      })
      .then(() => location.reload());
  }

  function removeItem(cartId) {

      fetch(`/cart/remove/${cartId}`, {
          method: "DELETE"
      })
      .then(() => location.reload());
  }
</script>

<script src="/js/main.js"></script>
<script>
  document.getElementById("placeOrderBtn").addEventListener("click", function() {

      fetch("/api/orders/place", {
          method: "POST",
          headers: {
              "Content-Type": "application/json"
          }
      })
      .then(response => {
          if (!response.ok) {
              throw new Error("Failed to place order");
          }
          return response.text();
      })
      .then(data => {
          alert("✅ Order placed successfully!");
          window.location.href = "/dashboard.html";
      })
      .catch(error => {
          alert("❌ Error placing order");
          console.error(error);
      });

  });
</script>
</body>
</html>
