<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Pandas Clothing</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/panda.png">
</head>
<body>

<header class="navbar">
  <div class="left">
    <div onclick="toggleMenu()">☰</div>
  </div>

  <div class="center">
    <div class="brand">
      <img src="/images/panda.png" height="26">
      <span style="font-size:22px;font-weight:600;letter-spacing:2px;">
                PANDAS
            </span>
    </div>
  </div>

  <div class="right">

    <a href="/wishlist.html" class="icon">
      ♡
      <span id="wishlist-count" class="badge">0</span>
    </a>

    <a href="/cart.html" class="icon">
      🛒
      <span id="cart-count" class="badge">0</span>
    </a>

    <a href="/account.html" class="icon">
      👤
    </a>

  </div>
</header>

<div id="sideMenu" class="side-menu">
  <div class="close-btn" onclick="toggleMenu()">✖</div>

  <ul>
    <li><a href="/index.html">Home</a></li>
    <li><a href="/account.html">Account</a></li>
    <li><a href="/shirts.html">Shirts</a></li>
    <li><a href="/cargo.html">Cargo</a></li>
    <li><a href="/tshirts.html">T-Shirts</a></li>
    <li><a href="/shoes.html">Shoes</a></li>
<!--    <li><a href="/account.html">Account</a></li>-->
  </ul>
</div>

<div id="overlay" onclick="toggleMenu()"></div>
<section class="product-grid">

  <div class="product-card">
    <img src="/images/Tshirts/tshirt1.png">
    <h3>Classic Tee</h3>
    <p>&#8377;5599</p>
    <div class="sizes">
      <button class="size-btn" onclick="selectSize(this)">S</button>
      <button class="size-btn" onclick="selectSize(this)">M</button>
      <button class="size-btn" onclick="selectSize(this)">L</button>
      <button class="size-btn" onclick="selectSize(this)">XL</button>
    </div>
    <button onclick="addToCart(5,this)">ADD TO BAG</button>
    <button onclick="addToWishlist(5,this)">♡ Wishlist</button>
  </div>

  <div class="product-card">
    <img src="/images/Tshirts/tshirt2.png">
    <h3>Diesel Tee</h3>
    <p>&#8377;9089</p>
    <div class="sizes">
      <button class="size-btn" onclick="selectSize(this)">S</button>
      <button class="size-btn" onclick="selectSize(this)">M</button>
      <button class="size-btn" onclick="selectSize(this)">L</button>
      <button class="size-btn" onclick="selectSize(this)">XL</button>
    </div>
    <button onclick="addToCart(6,this)">ADD TO BAG</button>
    <button onclick="addToWishlist(6,this)">♡ Wishlist</button>
  </div>

  <div class="product-card">
    <img src="/images/Tshirts/tshirt3.png">
    <h3>Black Tee</h3>
    <p>&#8377;88499</p>
    <div class="sizes">
      <button class="size-btn" onclick="selectSize(this)">S</button>
      <button class="size-btn" onclick="selectSize(this)">M</button>
      <button class="size-btn" onclick="selectSize(this)">L</button>
      <button class="size-btn" onclick="selectSize(this)">XL</button>
    </div>
    <button onclick="addToCart(7,this)">ADD TO BAG</button>
    <button onclick="addToWishlist(7,this)">♡ Wishlist</button>
  </div>

</section>

<footer class="footer">
  <p>© 2026 Pandas Clothing</p>
</footer>
<script src="/js/main.js"></script>
</body>
</html>
