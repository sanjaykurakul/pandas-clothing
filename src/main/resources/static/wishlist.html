<script>
  fetch("/wishlist/my")
  .then(res => res.json())
  .then(data => {

      const container = document.getElementById("wishlist-container");
      container.innerHTML = "";

      data.forEach(item => {

          const itemDiv = document.createElement("div");
          itemDiv.className = "wishlist-item";

          itemDiv.innerHTML = `
              <img src="http://localhost:8081${item.product.image}" class="wishlist-img">

              <div class="wishlist-details">
                  <h3>${item.product.name}</h3>
                  <p>₹ ${item.product.price}</p>

                  <button onclick="moveToCart(${item.id})" class="move-btn">
                      ADD TO BAG
                  </button>

                  <button onclick="removeWishlist(${item.id})" class="remove-btn">
                      REMOVE
                  </button>
              </div>
          `;

          container.appendChild(itemDiv);
      });
  });

  function moveToCart(wishlistId) {

      fetch(`/wishlist/move-to-cart/${wishlistId}`, {
          method: "POST"
      })
      .then(() => location.reload());
  }

  function removeWishlist(wishlistId) {

      fetch(`/wishlist/remove/${wishlistId}`, {
          method: "DELETE"
      })
      .then(() => location.reload());
  }
</script>
